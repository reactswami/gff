<!-- Migrated to React (GraphLegendEditor.tsx) -->
<graph-legend-editor ctrl="ctrl"></graph-legend-editor>
<!-- Drilldown/Link: gf-dashboard-link is still Angular -->
<div class="editor-row">
  <div class="section gf-form-group">
    <h5 class="section-heading">Drilldown/Link</h5>
    <div class="gf-form">
      <gf-dashboard-link dashboard="ctrl.panel.drilldown.dashboard"
            type="ctrl.panel.drilldown.type"
            link-name="ctrl.panel.drilldown.linkName"
            url="ctrl.panel.drilldown.url"
            keep-time="ctrl.panel.drilldown.keepTime"
            include-vars="ctrl.panel.drilldown.includeVars"
            target-blank="ctrl.panel.drilldown.targetBlank"
            report="ctrl.panel.drilldown.report"
            plugin="graph-chart"
            var-name="ctrl.panel.drilldown.varName"
            params="ctrl.panel.drilldown.params"
            on-dashboard-change="ctrl.panel.drilldown.params=''"
            show-legend="ctrl.panel.drilldown.showLegend"
            on-change="ctrl.refresh()">
      </gf-dashboard-link>
    </div>
  </div>
</div>
